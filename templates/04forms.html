<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Form Elements</title>
<!--
  Clean, accessible form markup.
  - Uses HTML5 doctype and semantic elements.
  - Includes basic client-side validation attributes.
  - Preserves original functionality (username, email, password, gender, comment).
  - Action attributes are placeholders ("#") — replace with real endpoints as needed.
-->
</head>
<body>
<main>
  <section aria-labelledby="form-heading">
    <h1 id="form-heading">Form Elements</h1>

    <!-- User details form -->
    <form id="user-form" method="post" action="#" novalidate>
      <div>
        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          maxlength="5"
          size="15"
          placeholder="Enter username"
          required
          aria-describedby="username-help"
        >
        <small id="username-help">Max 5 characters.</small>
      </div>

      <div>
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
        >
      </div>

      <div>
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          minlength="8"
          placeholder="Enter a secure password"
          required
        >
      </div>

      <fieldset>
        <legend>Select your gender</legend>
        <div>
          <input type="radio" id="male" name="gender" value="male">
          <label for="male">Male</label>
        </div>
        <div>
          <input type="radio" id="female" name="gender" value="female">
          <label for="female">Female</label>
        </div>
        <div>
          <input type="radio" id="other" name="gender" value="other">
          <label for="other">Other</label>
        </div>
      </fieldset>

      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </section>

  <!-- Comment form -->
  <section aria-labelledby="comments-heading">
    <h2 id="comments-heading">Leave a comment</h2>

    <form id="comment-form" method="post" action="#" novalidate>
      <div>
        <label for="comment">Comment</label>
        <br>
        <textarea
          id="comment"
          name="comment"
          rows="6"
          cols="40"
          placeholder="Please share your experience"
          required
        ></textarea>
      </div>

      <div>
        <button type="submit">Send Comment</button>
      </div>
    </form>
  </section>
</main>
</body>
</html>
