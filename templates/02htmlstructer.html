<!DOCTYPE html>
<!--
  Document: Simple HTML structure for listing names and a short description.
  Charset: UTF-8
  Notes: Fixed head/body structure, added meta charset and content-type, corrected tag nesting and closing tags.
-->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML Structure</title>
    <meta name="description" content="A simple page that lists names and a brief description of household relationships.">
  </head>
  <body>
    <header role="banner" aria-label="Names header">
      <h1>Balabhavani</h1>
      <h2>Balabharathi</h2>
      <h3>Bobby</h3>
      <h4>Srinivas</h4>
      <h5>Lakshmi</h5>
      <h6>Kran</h6>
    </header>
    <main role="main" aria-label="Main content">
      <section aria-label="Description">
        <p>
          People who live together under a common household authority often have reciprocal duties
          and responsibilities toward each other.
        </p>
      </section>
    </main>
  </body>
</html>
