<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirect Link</title>
    <!--
        Minimal HTML page containing a single link to Google.
        Preserves original functionality (a link to http://google.com).
    -->
</head>
<body>
    <!--
        Anchor opens in the same tab by default to preserve original behavior.
        If you want to open in a new tab, add target="_blank" and rel="noopener noreferrer".
    -->
    <a href="http://google.com">go to Google</a>
</body>
</html>
